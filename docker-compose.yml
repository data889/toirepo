services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: toirepo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: toirepo
      POSTGRES_USER: toirepo
      POSTGRES_PASSWORD: toirepo
    ports:
      - '5433:5432'
    volumes:
      - toirepo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U toirepo -d toirepo']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  toirepo_pg_data:
    name: toirepo_pg_data
